# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build and publish with the current workflow file
        required: true
        default: refs/heads/main

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      # Release-tag reruns execute the workflow as frozen at the tagged commit.
      # Use workflow_dispatch from main with source_ref=refs/tags/vX.Y.Z to replay
      # publication with the current workflow logic and environment secrets.
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ inputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    # Publish through an environment-bound project-scoped API token secret.
    # This is the current reliable production path for calamum-vulcan after
    # PyPI Trusted Publishing returned `invalid-publisher` on the unchanged
    # release workflow for both v0.2.0 and v0.3.0.
    environment:
      name: pypi
      url: https://pypi.org/project/calamum-vulcan/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        if: github.event_name != 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          attestations: false

      - name: Publish release distributions to PyPI (manual rerun)
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          attestations: false
          skip-existing: true
          print-hash: true
